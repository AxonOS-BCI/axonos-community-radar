name: ✨ Feature request
description: Propose an improvement to the radar — engine, UI, data, or docs.
title: "[feat] <short summary>"
labels: ["type:feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape the radar. Triaged features land on the
        [Roadmap board](https://github.com/users/AxonOS-BCI/projects/1).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need or gap. What can't you do today?
      placeholder: "As a <who>, I want <what> so that <why>."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the radar do? Sketches, links, or examples welcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the radar does this touch?
      options:
        - engine (relevance / domain scoring)
        - ui (site, map, cards, charts)
        - data (enrichment, history, exports)
        - infra (CI/CD, hosting, API)
        - docs (methodology, roadmap)
        - not sure
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority (your view)
      options:
        - "high — blocks real use"
        - "medium — clear value"
        - "low — nice to have"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, and why this one.
    validations:
      required: false

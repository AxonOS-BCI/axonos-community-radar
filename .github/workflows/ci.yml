name: CI

# Six independent gates. Every push to main must turn the whole wall green —
# the checks page IS the quality statement for this repository.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-integrity:
    name: Data integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: JSON is valid
        run: |
          python3 -c "import json;json.load(open('data/seeds.json'));print('seeds.json ok')"
          python3 -c "import json;json.load(open('data/radar.json'));print('radar.json ok')"

      - name: Validate published radar.json
        run: python3 scripts/validate_payload.py data/radar.json

      - name: Validate history.json
        run: |
          python3 - <<'PY'
          import json
          h = json.load(open("data/history.json", encoding="utf-8"))
          assert h.get("version") == 1, "history version"
          assert isinstance(h.get("snapshots"), list), "snapshots list"
          for s in h["snapshots"]:
              assert isinstance(s.get("snapshot_at"), str)
              assert isinstance(s.get("stars"), dict) and len(s["stars"]) <= 200
              assert all(isinstance(v, int) and v >= 0 for v in s["stars"].values())
          print("history.json ok")
          PY

      - name: Schema validation
        # Every dataset that ships a schema file must be checked against it here —
        # a schema that only ever gets *pointed to* (by build_api_index.py) and
        # never actually enforced is a promise CI cannot back up.
        run: |
          pip install -r requirements-ci.txt --quiet
          python3 -c "import json,jsonschema; jsonschema.validate(json.load(open('data/radar.json')), json.load(open('data/radar.schema.json'))); print('radar.json schema ok')"
          if [ -f data/trajectory.json ] && [ -f data/trajectory.schema.json ]; then
            python3 -c "import json,jsonschema; jsonschema.validate(json.load(open('data/trajectory.json')), json.load(open('data/trajectory.schema.json'))); print('trajectory.json schema ok')"
          else
            echo "trajectory.json or its schema not present yet — skip (not an error pre-publish)"
          fi

      - name: Build and validate deploy-time-only datasets
        # signals.json never exists in the checkout (build_signals.py's own
        # docstring: "Deploy-time and pure ... commits nothing") — a check
        # that only looks for a pre-existing data/signals.json always skips
        # and never actually enforces anything. Build it the same way the
        # real deploy does, then validate that real output.
        run: |
          python3 scripts/build_signals.py --out /tmp/_site_check --radar data/radar.json --first-seen data/first_seen.json
          python3 -c "import json,jsonschema; jsonschema.validate(json.load(open('/tmp/_site_check/data/signals.json')), json.load(open('data/signals.schema.json'))); print('signals.json (built fresh, same as deploy) schema ok')"

      - name: Feed is well-formed
        run: python3 -c "import xml.dom.minidom as m;m.parse('feed.xml');print('feed.xml ok')"

      - name: first_seen sanity (no future timestamps)
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).isoformat()
          fs = json.load(open("data/first_seen.json", encoding="utf-8"))
          bad = [k for k, v in fs.items() if isinstance(v, str) and v > now]
          assert not bad, f"future first_seen: {bad[:5]}"
          print(f"first_seen ok ({len(fs)} entries, none in the future)")
          PY

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Python syntax
        run: python3 -m py_compile scripts/validate_payload.py scripts/publish_stats_issue.py scripts/health_check.py scripts/build_ecosystem_manifest.py scripts/build_exports.py scripts/build_signals.py scripts/build_api_index.py scripts/build_badges.py scripts/sync_engine_data.py scripts/interop.py scripts/check_methodology.py

      - name: Unit tests
        run: |
          pip install -r requirements-ci.txt --quiet
          python3 -m pytest tests/ -q

      - name: Documentation-coverage gate (v6)
        # Every shipped signal, interop tag and endpoint must be explained in
        # the Methodology view and docs/METHODOLOGY.md, and every tag must
        # exist in the UI label map. A signal without its explanation fails CI.
        run: python3 scripts/check_methodology.py

      - name: Interop vocabulary self-check
        run: python3 scripts/interop.py

  frontend:
    name: Frontend integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: HTML integrity + strict CSP
        run: |
          grep -qi '<!doctype html>' index.html
          grep -q '<canvas id="radar"' index.html
          grep -q "'./data/radar.json'" assets/app.js
          grep -q 'og:image' index.html
          grep -q 'function safeUrl' assets/app.js
          for f in index.html stats.html report.html; do grep -q "script-src 'self';" "$f" && grep -q "style-src 'self';" "$f" && ! grep -q "unsafe-inline" "$f" || { echo "CSP not strict: $f"; exit 1; }; done
          echo "strict CSP (no unsafe-inline) ok"

      - name: stats page integrity
        run: |
          for s in 'Content-Security-Policy' 'id="growth"'; do grep -q "$s" stats.html || { echo "stats.html missing: $s"; exit 1; }; done
          grep -q 'function safeUrl' assets/stats.js && grep -q "'./data/radar.json'" assets/stats.js || { echo "stats.js missing safeUrl/data"; exit 1; }
          echo "stats ok"

      - name: JS syntax
        run: |
          node --check assets/app.js
          node --check assets/stats.js

      - name: Functional UI smoke (jsdom)
        run: |
          npm install --no-save --silent jsdom
          node tests/ui_smoke.mjs

  security:
    name: Security gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Secret scan
        run: |
          if grep -rEn --exclude-dir=node_modules 'ghp_[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----' --include='*.py' --include='*.html' --include='*.md' --include='*.json' .; then
            echo "potential secret found"; exit 1
          fi
          echo "no secrets"

      - name: SAST (bandit)
        run: |
          pip install bandit --quiet
          # Skips are deliberate design, each reviewed in docs/THREAT_MODEL.md:
          #   B101 assert            — validate() gates data with asserts, CI-enforced
          #   B110/B112 try/except   — resilience: a bad snapshot/entry must never kill the pipeline
          #   B310 urllib.urlopen    — every URL is allowlisted (api.github.com / *.github.io)
          #   B406 xml.sax escape    — used to ESCAPE output for the RSS feed, never to parse XML
          bandit -q -r scripts/ -s B101,B110,B112,B310,B406
          echo "bandit clean"

      - name: Actions are pinned to a commit SHA
        run: |
          bad="$(grep -RhoE 'uses: [^ ]+@[A-Za-z0-9._/-]+' .github/workflows | sed -E 's/[[:space:]]+#.*//' | grep -vE '@[0-9a-f]{40}$' || true)"
          if [ -n "$bad" ]; then echo "Unpinned actions:"; echo "$bad"; exit 1; fi
          echo "all actions SHA-pinned"

      - name: Line endings (no CRLF)
        run: |
          if grep -rlP --exclude-dir=node_modules '\r$' --include='*.py' --include='*.html' --include='*.md' --include='*.json' --include='*.yml' .; then
            echo "CRLF found"; exit 1
          fi
          echo "LF ok"

  release-hygiene:
    name: Release hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Required files
        run: |
          for f in README.md LICENSE VERSION index.html report.html assets/app.js assets/app.css assets/report.css assets/stats.js stats.html feed.xml og-image.png CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md CHANGELOG.md CITATION.cff data/seeds.json data/radar.schema.json data/curated.json docs/METHODOLOGY.md docs/DATA_MODEL.md docs/THREAT_MODEL.md docs/INCIDENT_RESPONSE.md docs/RETENTION.md docs/SBOM.md .github/dependabot.yml .github/workflows/health.yml .github/workflows/pages.yml .nojekyll tests/ui_smoke.mjs scripts/validate_payload.py scripts/publish_stats_issue.py scripts/health_check.py scripts/build_ecosystem_manifest.py scripts/build_exports.py data/curated.json support.html assets/support.css assets/support.js assets/doge-qr.svg data/ecosystem-registry.json .github/FUNDING.yml scripts/interop.py data/interop-vocab.json scripts/check_methodology.py tests/test_interop.py tests/test_ecosystem_manifest.py tests/test_exports.py tests/test_stats_issue.py tests/test_signals.py tests/test_api_index.py tests/test_badges.py scripts/build_signals.py scripts/build_api_index.py scripts/sync_engine_data.py docs/API.md docs/BADGES.md data/signals.schema.json data/trajectory.schema.json .github/workflows/sync.yml scripts/build_badges.py; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "all required files present"

      - name: Workflows reference only files that exist
        # Regression gate. The 8.0.0 slimming deleted scripts that pages.yml and
        # health.yml still call at deploy time: CI stayed green while the site
        # deploy broke, because CI only ran what CI itself listed. Every
        # scripts/* referenced by an ACTIVE workflow (*.yml — .disabled files are
        # inert by design) must exist in the tree.
        run: |
          missing=0
          for f in $(grep -rhoE 'scripts/[A-Za-z0-9_./-]+\.(py|sh)' .github/workflows/*.yml | sort -u); do
            [ -f "$f" ] || { echo "MISSING: $f — referenced by an active workflow"; missing=1; }
          done
          [ "$missing" = "0" ] && echo "every script referenced by an active workflow exists"
          exit "$missing"

      - name: Funding consistency (ONE DOGE address, checksum-verified, everywhere)
        # The single-source rule for the support address. Guards against a
        # typo'd or swapped address ever shipping on any surface: the registry
        # is canonical; app.js, support.html, FUNDING.yml and the QR alt-text
        # must all carry exactly it — and it must pass Base58Check (0x1E).
        run: |
          python3 - <<'PY'
          import hashlib, json, re
          ALPH='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'
          def b58check(s):
              n=0
              for ch in s: n=n*58+ALPH.index(ch)
              raw=n.to_bytes(25,'big')
              return raw[0]==0x1E and hashlib.sha256(hashlib.sha256(raw[:-4]).digest()).digest()[:4]==raw[-4:]
          reg=json.load(open('data/ecosystem-registry.json'))['funding']
          addr=reg['address']
          assert b58check(addr), 'registry DOGE address fails Base58Check'
          assert reg['uri']==f'dogecoin:{addr}' and addr in reg['explorer']
          for path in ('assets/app.js','support.html','.github/FUNDING.yml'):
              body=open(path,encoding='utf-8').read()
              assert addr in body, f'{path} missing canonical address'
              others=set(re.findall(r'\bD[1-9A-HJ-NP-Za-km-z]{25,40}\b',body))-{addr}
              assert not others, f'{path} carries a FOREIGN D-address: {others}'
          print(f'funding consistency ok: {addr} (Base58Check valid, single-source)')
          PY

      - name: Version consistency (VERSION == badge == CITATION == bibtex == CHANGELOG)
        run: |
          python3 - <<'PY'
          import re, sys
          v = open("VERSION").read().strip()
          readme = open("README.md", encoding="utf-8").read()
          cff = open("CITATION.cff", encoding="utf-8").read()
          chlog = open("CHANGELOG.md", encoding="utf-8").read()
          errs = []
          if f"version-{v}-" not in readme: errs.append(f"README badge != {v}")
          m = re.search(r"version = \{([^}]+)\}", readme)
          if not m or m.group(1) != v: errs.append(f"README bibtex {m.group(1) if m else '?'} != {v}")
          m = re.search(r"^version: (.+)$", cff, re.M)
          if not m or m.group(1).strip() != v: errs.append(f"CITATION.cff != {v}")
          m = re.search(r"^## \[([0-9.]+)\]", chlog, re.M)
          if not m or m.group(1) != v: errs.append(f"CHANGELOG top {m.group(1) if m else '?'} != {v}")
          for page in ("index.html", "stats.html"):
              if f"v{v}" not in open(page, encoding="utf-8").read():
                  errs.append(f"{page} footer chip != v{v}")
          if errs: print("\n".join(errs)); sys.exit(1)
          print(f"version {v} consistent across VERSION/README badge/bibtex/CITATION/CHANGELOG")
          PY

      - name: Licence sanity (MIT text intact)
        run: |
          grep -q "MIT License" LICENSE && grep -q "Denis Yermakou" LICENSE || { echo "LICENSE malformed"; exit 1; }
          echo "LICENSE ok"

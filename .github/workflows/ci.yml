name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate radar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # v4

      - name: JSON is valid
        run: |
          python3 -c "import json;json.load(open('data/seeds.json'));print('seeds.json ok')"
          python3 -c "import json;json.load(open('data/radar.json'));print('radar.json ok')"

      - name: stats.html integrity + inline JS
        run: |
          for s in 'Content-Security-Policy' 'function safeUrl' "'./data/radar.json'" 'id="growth"'; do
            grep -q "$s" stats.html || { echo "stats.html missing: $s"; exit 1; }
          done
          awk '/<script>/{f=1;next} /<\/script>/{f=0} f' stats.html > /tmp/stats.js
          node --check /tmp/stats.js && echo "stats.html inline JS ok"

      - name: Validate published radar.json
        run: python3 scripts/validate_payload.py data/radar.json

      - name: Validate history.json
        run: |
          python3 - <<'PY'
          import json
          h = json.load(open("data/history.json", encoding="utf-8"))
          assert h.get("version") == 1, "history version"
          assert isinstance(h.get("snapshots"), list), "snapshots list"
          for s in h["snapshots"]:
              assert isinstance(s.get("snapshot_at"), str)
              assert isinstance(s.get("stars"), dict) and len(s["stars"]) <= 200
              assert all(isinstance(v, int) and v >= 0 for v in s["stars"].values())
          print("history.json ok")
          PY

      - name: Schema validation
        run: |
          pip install -r requirements-ci.txt --quiet
          python3 -c "import json,jsonschema; jsonschema.validate(json.load(open('data/radar.json')), json.load(open('data/radar.schema.json'))); print('schema ok')"

      - name: Feed is well-formed
        run: python3 -c "import xml.dom.minidom as m;m.parse('feed.xml');print('feed.xml ok')"

      - name: Python syntax
        run: python3 -m py_compile scripts/radar.py scripts/publish_data.py scripts/validate_payload.py scripts/publish_stats_issue.py

      - name: Unit tests
        run: |
          pip install -r requirements-ci.txt --quiet
          python3 -m pytest tests/ -q

      - name: HTML integrity + security
        run: |
          grep -qi '<!doctype html>' index.html
          grep -q '<canvas id="radar"' index.html
          grep -q "'./data/radar.json'" assets/app.js
          grep -q 'Content-Security-Policy' index.html
          grep -q 'function safeUrl' assets/app.js
          grep -q 'og:image' index.html
          grep -q "script-src 'self';" index.html
          ! grep -q "script-src 'self' 'unsafe-inline'" index.html && echo "strict script-CSP ok"

      - name: Inline JS syntax
        run: |
          node --check assets/app.js
          node --check assets/app.css 2>/dev/null || true

      - name: Required files
        run: |
          for f in README.md LICENSE VERSION index.html assets/app.js assets/app.css stats.html feed.xml og-image.png CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md CHANGELOG.md data/seeds.json data/radar.schema.json scripts/radar.py scripts/publish_data.py scripts/validate_payload.py scripts/publish_stats_issue.py tests/test_radar.py; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done

      - name: Secret scan
        run: |
          if grep -rEn 'ghp_[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----' --include='*.py' --include='*.html' --include='*.md' --include='*.json' .; then
            echo "potential secret found"; exit 1
          fi
          echo "no secrets"

      - name: Line endings (no CRLF)
        run: |
          if grep -rlP '\r$' --include='*.py' --include='*.html' --include='*.md' --include='*.json' --include='*.yml' .; then
            echo "CRLF found"; exit 1
          fi
          echo "LF ok"

      - name: Actions are pinned to a commit SHA
        run: |
          bad="$(grep -RhoE 'uses: [^ ]+@[A-Za-z0-9._/-]+' .github/workflows | sed -E 's/[[:space:]]+#.*//' | grep -vE '@[0-9a-f]{40}$' || true)"
          if [ -n "$bad" ]; then echo "Unpinned actions:"; echo "$bad"; exit 1; fi
          echo "all actions SHA-pinned"

name: Deploy Pages

# ─────────────────────────────────────────────────────────────────────────────
# SINGLE deploy path. Root cause of the repeated "Canceling Pages deployment /
# Unable to cancel as it's finished" failures was concurrency.cancel-in-progress
# combined with multiple triggers: two runs overlapped, the newer tried to
# cancel the older, the older finished mid-cancel, and the whole run errored.
#
# Fix, definitively:
#   • ONE trigger for automatic deploys: workflow_run after "AxonOS Radar".
#     No push trigger (site files land via the scan's own commit, which fires
#     workflow_run anyway) → the two-source overlap cannot happen.
#   • concurrency cancel-in-progress: FALSE → deploys queue, never cancel each
#     other. A queued deploy simply waits; nothing errors.
#   • exactly one deploy-pages step (the old "retry" step spawned a SECOND
#     deployment inside the same job — another overlap source). Removed.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["AxonOS Radar"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deploys; never cancel a running one. This is the opposite of the old
# setting and is what stops the "unable to cancel, it's finished" error.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy site artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Automatic runs deploy only after a green scan; manual dispatch always does.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main   # workflow_run checks out the triggering sha; be explicit

      - name: Assemble site (public files only — never .git or tooling)
        run: |
          mkdir -p _site/data _site/assets
          cp index.html stats.html report.html feed.xml og-image.png _site/
          cp -r assets/. _site/assets/
          cp data/*.json _site/data/
          touch _site/.nojekyll
          echo "site files: $(find _site -type f | wc -l)"

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

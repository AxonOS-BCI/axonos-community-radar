name: Open BCI Ecosystem Radar

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/radar.yml"
      - "scripts/**"
      - "data/seeds.json"

permissions:
  contents: write

concurrency:
  group: axonos-community-radar
  cancel-in-progress: false

jobs:
  radar:
    name: Refresh ecosystem radar
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh radar data
        run: python3 scripts/radar.py

      - name: Commit updated radar data
        run: |
          if [ -n "$(git status --porcelain data/radar.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/radar.json
            git commit -m "radar: refresh ecosystem data [skip ci]"
            git push
          else
            echo "No change in data/radar.json"
          fi
